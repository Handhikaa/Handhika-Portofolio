                                                ? 'bg-[#5ce198] text-[#0a1512] shadow-[0_0_15px_rgba(92,225,152,0.3)]' 
                                                : 'bg-white/5 text-gray-400 hover:bg-white/10 hover:text-white'
                                        }`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {filteredProjects.map((project) => (
                                    <div key={project.id} className="bg-[#12241f] border border-white/5 rounded-3xl overflow-hidden hover:border-[#5ce198]/30 transition-all duration-300 group flex flex-col hover:-translate-y-1 text-left cursor-pointer" onClick={() => setSelectedProject(project)}>
                                        <div className={`h-56 w-full flex items-center justify-center ${project.imgColor} relative overflow-hidden shrink-0`}>
                                            <div className="text-center z-10">
                                                <span className="block font-black opacity-40 uppercase tracking-[0.2em] text-lg">{project.category}</span>
                                            </div>
                                            <div className="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors duration-500"></div>
                                        </div>
                                        <div className="p-8 flex flex-col flex-1">
                                            <div className="text-xs font-bold uppercase text-[#5ce198] mb-3 tracking-wider">{project.category}</div>
                                            <h3 className="font-bold text-2xl mb-4 text-white">{project.title}</h3>
                                            <p className="text-gray-400 text-sm mb-6 line-clamp-2 leading-relaxed">{project.desc}</p>
                                            
                                            <div className="bg-[#0a1512] border border-[#5ce198]/20 p-4 rounded-2xl mt-auto relative overflow-hidden group-hover:bg-[#162621] transition-colors">
                                                <div className="absolute top-0 left-0 w-1 h-full bg-[#5ce198]"></div>
                                                <p className="text-sm text-gray-300 mb-2">
                                                    <span className="block text-[#5ce198] font-bold mb-1 flex items-center gap-2">
                                                        <i className="fa-solid fa-chart-simple"></i> Result:
                                                    </span> 
                                                    {project.result}
                                                </p>
                                                <span className="text-[10px] text-[#5ce198] font-bold flex items-center gap-1 group-hover:translate-x-1 transition-transform uppercase tracking-wider">
                                                    KLIK UNTUK DETAIL <i className="fa-solid fa-chevron-right text-[8px]"></i>
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* BRANDS COLLABORATION SECTION */}
                    <section id="brands" className="py-24 bg-[#0d1a17] border-y border-white/5">
                        <div className="max-w-7xl mx-auto px-6 text-center">
                            <p className="text-[#5ce198] text-xs font-black uppercase tracking-[0.4em] mb-12 opacity-80">Brands I've Collaborated With</p>
                            
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-8 md:gap-12 items-center justify-items-center opacity-50 hover:opacity-100 transition-opacity duration-700">
                                {brands.map((brand, index) => (
                                    <div key={index} className="group relative flex items-center justify-center p-4 w-full">
                                        <img 
                                            src={brand.logo} 
                                            alt={brand.name} 
                                            className="max-h-14 w-auto grayscale group-hover:grayscale-0 group-hover:scale-110 transition-all duration-300 object-contain" 
                                        />
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* CONTACT SECTION */}
                    <section id="contact" className="py-32 bg-[#12241f] text-center relative overflow-hidden">
                        <div className="max-w-3xl mx-auto px-6 relative z-10">
                            <h2 className="text-5xl md:text-6xl font-black mb-6 text-white tracking-tight uppercase">Let's Work <span className="text-[#5ce198]">Together</span></h2>
                            <p className="text-gray-400 text-lg mb-12 leading-relaxed">
                                Siap untuk meningkatkan performa digital brand Anda? Mari berdiskusi tentang strategi, eksekusi iklan, pembuatan landing page, hingga pembuatan konten.
                            </p>
                            <div className="flex flex-col sm:flex-row justify-center gap-5">
                                <a href="mailto:emailanda@domain.com" className="inline-flex justify-center items-center gap-2 bg-[#5ce198] text-[#0a1512] px-8 py-4 rounded-full font-bold hover:bg-[#4dd389] hover:shadow-[0_0_20px_rgba(92,225,152,0.4)] transition-all">
                                    <i className="fa-solid fa-envelope"></i> Hubungi via Email
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* MODAL DETAIL PROJECT */}
                    {selectedProject && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-10 bg-[#0a1512]/95 backdrop-blur-xl">
                            <div className="bg-[#12241f] w-full max-w-5xl h-full max-h-[90vh] rounded-[2.5rem] border border-white/10 shadow-2xl flex flex-col overflow-hidden relative">
                                <button 
                                    onClick={() => setSelectedProject(null)}
                                    className="absolute top-6 right-6 z-10 w-12 h-12 rounded-full bg-[#0a1512]/50 border border-white/10 flex items-center justify-center text-white hover:bg-red-500 hover:text-white transition-all shadow-xl"
                                >
                                    <i className="fa-solid fa-xmark text-xl"></i>
                                </button>
                                <div className="flex-1 overflow-y-auto p-8 md:p-12 text-left">
                                    <div className="mb-10 text-left">
                                        <span className="text-[#5ce198] text-xs font-black uppercase tracking-[0.3em] mb-3 block">{selectedProject.category}</span>
                                        <h2 className="text-4xl md:text-5xl font-black text-white mb-6 leading-tight">{selectedProject.title}</h2>
                                        <div className="h-1 w-20 bg-[#5ce198] rounded-full"></div>
                                    </div>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 text-left">
                                        <div className="space-y-10 text-left">
                                            <div>
                                                <h4 className="text-lg font-bold text-white mb-4 flex items-center gap-2">
                                                    <i className="fa-solid fa-list-check text-[#5ce198]"></i> Apa Yang Saya Kerjakan:
                                                </h4>
                                                <ul className="space-y-4">
                                                    {selectedProject.jobdesc.map((item, i) => (
                                                        <li key={i} className="flex gap-3 text-gray-400 text-sm leading-relaxed">
                                                            <i className="fa-solid fa-circle-check text-[#5ce198] mt-1 text-xs shrink-0"></i>
                                                            {item}
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                            <div className="bg-[#5ce198]/5 border border-[#5ce198]/20 p-6 rounded-3xl">
                                                <h4 className="text-lg font-bold text-[#5ce198] mb-3">Key Results:</h4>
                                                <p className="text-gray-200 font-medium leading-relaxed italic border-l-4 border-[#5ce198] pl-4">
                                                    "{selectedProject.result}"
                                                </p>
                                            </div>
                                        </div>
                                        <div>
                                            <h4 className="text-lg font-bold text-white mb-6 flex items-center gap-2">
                                                <i className="fa-solid fa-images text-[#5ce198]"></i> Evidence & Screenshots:
                                            </h4>
                                            <div className="space-y-4">
                                                {selectedProject.evidences.map((img, i) => (
                                                    <div key={i} className="rounded-2xl overflow-hidden border border-white/5 group relative">
                                                        <img src={img} alt={`Evidence ${i+1}`} className="w-full h-auto object-cover group-hover:scale-105 transition-transform duration-700" />
                                                        <div className="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
                                                            <span className="text-[10px] font-bold text-white uppercase tracking-widest">Screenshot Bukti Kerja {i+1}</span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-6 bg-[#0a1512]/50 border-t border-white/5 flex justify-center items-center">
                                    <p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest italic text-center">Dokumentasi Portofolio Handhika Avianto</p>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="bg-[#08110e] text-gray-500 text-center py-8 text-sm border-t border-white/5">
                        <p>&copy; {new Date().getFullYear()} Handhika Avianto. All rights reserved.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
